# WizERD Configuration - Full Options
# https://github.com/your-org/wizerd

# =============================================================================
# Output Options
# =============================================================================

# Output file path
output: diagram.svg

# =============================================================================
# Diagram Options
# =============================================================================

# Show foreign key names on connector lines
show-edge-labels: false

# Spacing preset: compact, standard, or spacious
spacing-profile: standard

# Use unique color per FK target (instead of single color)
# color-by-trunk: false

# =============================================================================
# Theme Options
# =============================================================================

# Theme name or path to custom theme file
theme: default-dark

# Theme overrides (inline customization)
# theme-overrides:
#   colors:
#     canvas_background: "#1a1a2e"
#   typography:
#     font_size_header: 16.0

# =============================================================================
# Advanced Options
# =============================================================================

# Custom spacing values (override spacing-profile)
# spacing:
#   column_gap: 360.0      # Horizontal distance between table columns
#   row_gap: 225.0         # Vertical distance between tables in a column
#   component_gap: 570.0   # Gap between disconnected groups of tables
#   edge_to_node_gap: 51.0 # Clearance between edges and tables
#   edge_gap: 39.0         # Clearance between parallel edges
#   margin: 72.0           # Canvas margin applied on both axes

# Edge color mode: single or by-trunk
# edge-color-mode: single
