# WizERD Configuration - Full Options

# =============================================================================
# Output Options
# =============================================================================

# Output file path
output: diagram.svg

# =============================================================================
# Diagram Options
# =============================================================================

# Show foreign key names on connector lines
show-edge-labels: false

# Spacing preset: compact, standard, or spacious
spacing-profile: standard

# Use unique color per FK target (instead of single color)
# color-by-trunk: false

# =============================================================================
# Theme Options
# =============================================================================

# Theme: specify either a built-in theme name OR a full custom theme definition
#
# Built-in theme (string):
# theme: default-dark
#
# Custom theme (dict with full theme definition):
# theme:
#   name: my-custom-theme
#   is_dark: true
#   colors:
#     canvas_background: "#1a1a2e"
#     table_background: "#16213e"
#     table_border: "#0f3460"
#     table_header_bg: "#0f3460"
#     table_header_text: "#e94560"
#     table_body_text: "#eaeaea"
#     table_secondary_text: "#a0a0a0"
#     zebra_row: "#1a1a2e"
#     pk_marker: "#ffd700"
#     fk_marker: "#00d4ff"
#   typography:
#     font_family: "'Inter', sans-serif"
#     font_size_header: 14
#     font_size_body: 12
#   dimensions:
#     header_height: 40
#     row_height: 28
#   edges:
#     edge_color: "#00d4ff"
#     edge_width: 2

# Theme overrides: customize specific values without defining full theme
# (applies to the theme specified above)
# theme-overrides:
#   colors:
#     canvas_background: "#1a1a2e"
#   typography:
#     font_size_header: 16.0

# =============================================================================
# Advanced Options
# =============================================================================

# Custom spacing values (override spacing-profile)
# spacing:
#   column_gap: 360.0      # Horizontal distance between table columns
#   row_gap: 225.0         # Vertical distance between tables in a column
#   component_gap: 570.0   # Gap between disconnected groups of tables
#   edge_to_node_gap: 51.0 # Clearance between edges and tables
#   edge_gap: 39.0         # Clearance between parallel edges
#   margin: 72.0           # Canvas margin applied on both axes

# Edge color mode: single or by-trunk
# edge-color-mode: single
