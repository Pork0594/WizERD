name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pip install -e ".[dev]"
          cd wizerd/layout && npm ci

      - name: Run tests
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pytest -v

      - name: Run linter
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m ruff check .

      - name: Run type check
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m mypy wizerd

  build-binaries:
    name: Build binary (${{ matrix.os }})
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pip install -e ".[dev]"
          cd wizerd/layout && npm ci

      - name: Build binary
        run: .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m PyInstaller wizerd.spec --clean
        env:
          WIZERD_BUNDLE_NODE: "1"

      - name: Create archive
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd dist/wizerd
            zip -r ../wizerd-${{ matrix.target }}.zip .
          else
            cd dist/wizerd
            tar -czvf ../../wizerd-${{ matrix.target }}.tar.gz .
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            dist/wizerd-*.tar.gz
            dist/wizerd-*.zip

  release:
    name: Semantic Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install semantic-release
        run: uv pip install --system python-semantic-release

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: semantic-release publish

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Attach binaries to release
        run: |
          TAG=$(git describe --tags --abbrev=0)
          if [ -n "$TAG" ]; then
            for f in binaries/*; do
              gh release upload "$TAG" "$f" --clobber
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
