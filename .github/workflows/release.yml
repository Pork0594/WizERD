name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --seed
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: |
          cd wizerd/layout && npm ci

      - name: Build binary
        run: .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m PyInstaller wizerd.spec --clean
        env:
          WIZERD_BUNDLE_NODE: "1"

      - name: Create archive
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd dist/wizerd
            zip -r ../wizerd-${{ matrix.target }}.zip .
          else
            cd dist/wizerd
            tar -czvf ../wizerd-${{ matrix.target }}.tar.gz .
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            dist/wizerd-*.tar.gz
            dist/wizerd-*.zip

  release:
    name: Semantic Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install semantic-release
        run: uv pip install --system python-semantic-release

      - name: Run semantic-release
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          semantic-release publish
          NEW_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Download all binaries
        if: steps.semrel.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Attach binaries to release
        if: steps.semrel.outputs.tag != ''
        run: |
          for f in binaries/*; do
            gh release upload "${{ steps.semrel.outputs.tag }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
