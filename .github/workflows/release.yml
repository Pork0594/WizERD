name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --seed
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: |
          cd wizerd/layout && npm ci

      - name: Run tests
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pytest -v

      - name: Run linter
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m ruff check .

      - name: Run type check
        run: |
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m mypy wizerd

  lint-only:
    name: Lint only (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install linters and package
        run: uv pip install --system ruff mypy -e .

      - name: Install Node dependencies
        run: |
          cd wizerd/layout && npm ci

      - name: Run linter
        run: ruff check .

      - name: Run type check
        run: mypy wizerd

  build-binaries:
    name: Build binary (${{ matrix.target }})
    needs: [lint-only, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --seed
          .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: cd wizerd/layout && npm ci

      - name: Build binary
        run: .venv/${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}/python -m PyInstaller wizerd.spec --clean
        env:
          WIZERD_BUNDLE_NODE: "1"

      - name: List dist output
        shell: bash
        run: ls -lR dist/

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if [ -e "dist/wizerd" ]; then
            tar -czvf dist/wizerd-${{ matrix.target }}.tar.gz -C dist wizerd
          else
            echo "ERROR: dist/wizerd not found. PyInstaller output:" && ls dist/ && exit 1
          fi

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path dist\wizerd.exe) {
            Compress-Archive -Path dist\wizerd.exe -DestinationPath dist\wizerd-${{ matrix.target }}.zip
          } elseif (Test-Path dist\wizerd) {
            Compress-Archive -Path dist\wizerd -DestinationPath dist\wizerd-${{ matrix.target }}.zip
          } else {
            Write-Host "ERROR: Neither dist\wizerd.exe nor dist\wizerd\ found. PyInstaller output:"
            Get-ChildItem dist\
            exit 1
          }

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            dist/wizerd-*.tar.gz
            dist/wizerd-*.zip

  release:
    name: Semantic Release
    needs: [lint-only, test, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install semantic-release
        run: uv pip install --system python-semantic-release

      - name: Run semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version

      - name: Run semantic-release publish
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release publish
          NEW_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Upload to PyPI
        if: steps.semrel.outputs.tag != ''
        run: |
          pip install twine
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Download all binaries
        if: steps.semrel.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Attach binaries to release
        if: steps.semrel.outputs.tag != ''
        run: |
          for f in binaries/*; do
            gh release upload "${{ steps.semrel.outputs.tag }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
